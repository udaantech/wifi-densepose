# MQTT Configuration for WiFi DensePose
# Place in: home-automation/mqtt/config/mosquitto.conf

listener 1883
allow_anonymous true

# WebSocket listener for browser clients
listener 9001
protocol websockets

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout

# WiFi DensePose topic patterns
# wifi-densepose/event/presence_on
# wifi-densepose/event/presence_off
# wifi-densepose/event/breathing_alert
# wifi-densepose/sensor/breathing_bpm
# wifi-densepose/sensor/heart_bpm
# wifi-densepose/sensor/motion_level
