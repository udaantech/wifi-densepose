<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiFi DensePose: Human Tracking Through Walls</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="components/calibration-tab.css">
    <link rel="stylesheet" href="components/alerts-tab.css">
    <link rel="stylesheet" href="components/dashboard-tab.css">
    <link rel="stylesheet" href="components/settings-tab.css">
    <link rel="stylesheet" href="components/liveview-tab.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>WiFi DensePose</h1>
            <p class="subtitle">Human Tracking Through Walls Using WiFi Signals</p>
            <div class="header-info">
                <span class="api-version"></span>
                <span class="api-environment"></span>
                <span class="overall-health"></span>
            </div>
        </header>

        <!-- Navigation (5 tabs) -->
        <nav class="nav-tabs">
            <button class="nav-tab active" data-tab="dashboard">Dashboard</button>
            <button class="nav-tab" data-tab="alerts">Alerts</button>
            <button class="nav-tab" data-tab="demo">Live View</button>
            <button class="nav-tab" data-tab="calibration">Calibration</button>
            <button class="nav-tab" data-tab="settings">Settings</button>
        </nav>

        <!-- Dashboard Tab (built dynamically by DashboardTab.js) -->
        <section id="dashboard" class="tab-content active"></section>

        <!-- Alerts Tab (built dynamically by AlertsTab.js) -->
        <section id="alerts" class="tab-content"></section>

        <!-- Live View Tab (built dynamically by LiveDemoTab.js) -->
        <section id="demo" class="tab-content"></section>

        <!-- Calibration Tab (built dynamically by CalibrationTab.js) -->
        <section id="calibration" class="tab-content"></section>

        <!-- Settings Tab (built dynamically by SettingsTab.js) -->
        <section id="settings" class="tab-content"></section>
    </div>

    <!-- Error Toast -->
    <div id="globalErrorToast" class="error-toast"></div>

    <!-- Load application scripts as modules -->
    <script type="module" src="app.js"></script>
</body>
</html>
